name: sos
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # -----------------------------------
  # Firebase Cloud Services
  # -----------------------------------
  firebase_core: ^2.30.0
  firebase_auth: ^4.19.0
  cloud_firestore: ^4.17.5
  firebase_storage: ^11.7.7
  google_sign_in: ^6.2.1
  firebase_messaging: ^14.9.4

  # -----------------------------------
  #  Maps & Location
  # -----------------------------------
  geolocator: ^12.0.0
  geocoding: ^4.0.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  
  # -----------------------------------
  #  Utilities & Core
  # -----------------------------------
  permission_handler: ^12.0.1
  url_launcher: ^6.3.2
  uuid: ^4.5.2
  battery_plus: ^6.0.2
  cupertino_icons: ^1.0.8
  path_provider: ^2.1.5
  http: ^1.6.0
  googleapis_auth: ^1.6.0 

  # -----------------------------------
  #  Background Services & Hardware
  # -----------------------------------
  flutter_background_service: ^5.1.0
  flutter_local_notifications: ^20.1.0
  telephony: ^0.2.0
  workmanager: ^0.9.0+3
  shake: ^3.0.0
  sensors_plus: ^6.1.2

  # -----------------------------------
  # Media & UI Components
  # -----------------------------------
  intl: ^0.20.2
  table_calendar: ^3.2.0
  record: ^6.0.0
  audioplayers: ^6.5.1
  
  # -----------------------------------
  #  Security & Vault
  # -----------------------------------
  encrypt: ^5.0.3
  local_auth: ^3.0.1
  image_picker: ^1.2.1
  flutter_activity_recognition: ^4.0.0
  shimmer: ^3.0.0
  shared_preferences: ^2.5.4
  flutter_ringtone_player: ^4.0.0+4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1 # 🔥 අලුතින් දැම්මා: App Icon එක මාරු කරන Package එක

# 🔥 අලුතින් දැම්මා: අලුත් ලෝගෝ එක තියෙන තැන App එකට කියන කෑල්ල
flutter_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/img1.png
    - assets/service_account.json